spring.application.name=ms-medico
server.port=${SERVER_PORT:8082}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ms_medico}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
springdoc.hateos.enabled=false

spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET:clave_super_secreta_12345678912345678900}
# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
